[build]
  base    = "web"
  command = "npm run build"
  publish = "dist"

# Nette URL's zonder .html
[[redirects]]
  from = "/wall-of-talent"
  to = "/wall-of-talent.html"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 301

# Studio: redirect naar Sanity hosting (deploy eerst met: cd studio && npx sanity deploy)
[[redirects]]
  from = "/studio"
  to = "https://theyouth-studio.sanity.studio/studio"
  status = 302
  force = true

[[redirects]]
  from = "/studio/*"
  to = "https://theyouth-studio.sanity.studio/studio/:splat"
  status = 302
  force = true
